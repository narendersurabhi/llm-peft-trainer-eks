apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: mlops
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels: {app: minio}
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-08-03T04-33-23Z
        args: ["server", "/data", "--console-address", ":9001"]
        envFrom:
        - secretRef: {name: mlflow-secrets}
        ports:
        - {containerPort: 9000}
        - {containerPort: 9001}
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim: {claimName: minio-pvc}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: mlops
spec:
  selector: {app: minio}
  ports:
  - {name: api, port: 9000, targetPort: 9000}
  - {name: console, port: 9001, targetPort: 9001}
