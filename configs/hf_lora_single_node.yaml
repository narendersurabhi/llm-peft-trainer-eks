train:
  backend: hf
  output_uri: outputs/hf-single
  base_model: mistralai/Mistral-7B-Instruct-v0.2
  seed: 42
  max_steps: 300
  save_steps: 50
  eval_steps: 50
  learning_rate: 0.0002
  max_seq_len: 1024
  micro_batch_size: 1
  grad_accum_steps: 16
  gradient_checkpointing: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  use_qlora: false
  use_deepspeed: false
  bf16: true
  fp16: false
data:
  train_uri: data/sample.jsonl
  eval_uri: data/sample.jsonl
  text_field: text
s3:
  endpoint_url: null
  bucket: null
  prefix: llm-runs
mlflow:
  tracking_uri: http://mlflow.mlops.svc.cluster.local:5000
  experiment: llm-peft-trainer
runtime:
  run_id: hf-single
  docker_image: ghcr.io/org/llm-peft-trainer:latest
